const AH = {"APCA-API-KEY-ID":CFG.key,"APCA-API-SECRET-KEY":CFG.secret};

async function alpGet(path) {
  const r = await fetch(`${CFG.base}${path}`, {headers:AH});
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function alpData(path, params={}) {
  const u = new URL(`${CFG.data}${path}`);
  Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));
  const r = await fetch(u,{headers:AH});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}

async function getBars(sym) {
  try {
    const start = new Date(Date.now()-42*864e5).toISOString().split('T')[0];
    const d = await alpData(`/stocks/${sym}/bars`,{timeframe:"1Day",limit:22,start,adjustment:"raw",feed:"iex"});
    return Array.isArray(d.bars) ? d.bars : [];
  } catch { return []; }
}

// Detail chart bars — supports 1D intraday through 1Y daily
async function getDetailBars(sym, range) {
  const R = {
    '1D':  {tf:'15Min', limit:30},
    '5D':  {tf:'1Hour', limit:50},
    '10D': {tf:'1Hour', limit:100},
    '1M':  {tf:'1Day',  limit:23},
    '3M':  {tf:'1Day',  limit:66},
    '6M':  {tf:'1Day',  limit:132},
    '1Y':  {tf:'1Day',  limit:253},
  };
  const {tf, limit} = R[range] || R['1M'];
  try {
    const params = {timeframe:tf, limit, adjustment:'raw', feed:'iex'};
    if(range==='1D') params.start = new Date().toISOString().split('T')[0];
    const d = await alpData(`/stocks/${sym}/bars`, params);
    return Array.isArray(d.bars) ? d.bars : [];
  } catch { return []; }
}

function calcMomentum(bars) {
  if(!bars||bars.length<5) return null;
  const c=bars.map(b=>b.c);
  const m5=(c[c.length-1]-c[c.length-5])/c[c.length-5];
  const m10=c.length>=10?(c[c.length-1]-c[c.length-10])/c[c.length-10]:m5;
  return m5*0.6+m10*0.4;
}

function timeAgo(s) {
  const d=(Date.now()-new Date(s))/1000;
  if(d<3600) return Math.floor(d/60)+"m";
  if(d<86400) return Math.floor(d/3600)+"h";
  return Math.floor(d/86400)+"d";
}

function sentimentOf(text) {
  const t=text.toLowerCase();
  const bull=["beats","surges","record","growth","expands","raises","upgrade","soars","rally","strong","profit","jumps","gains"];
  const bear=["miss","falls","cuts","loses","downturn","downgrade","warns","plunges","drops","decline","loss","weak","concern"];
  let s=0;
  bull.forEach(w=>{if(t.includes(w))s++;});
  bear.forEach(w=>{if(t.includes(w))s--;});
  return s;
}

// Fetch live prices from Alpaca batch trades/latest endpoint (real-time)
async function fetchLatestPrices(symbols) {
  if (!symbols || !symbols.length) return {};
  try {
    const syms = symbols.join(',');
    // Use snapshots endpoint — returns latestTrade + prevDailyBar in one call
    const d = await alpData('/stocks/snapshots', {symbols: syms, feed: 'iex'});
    const map = {};
    symbols.forEach(sym => {
      const snap = d[sym];
      if (!snap) return;
      const price = snap.latestTrade?.p || snap.minuteBar?.c || snap.dailyBar?.c;
      if (!price) return;
      const prevClose = snap.prevDailyBar?.c || snap.dailyBar?.o || price;
      const rawPct = prevClose ? ((price - prevClose) / prevClose) * 100 : 0;
      // Sanity check: >30% daily move almost certainly means bad/stale data
      const pct = Math.abs(rawPct) > 30 ? null : rawPct;
      map[sym] = {price, pct, prevClose};
    });
    return map;
  } catch { return {}; }
}

// Kept for compatibility — now uses Alpaca
async function fetchYahooQuotes(symbols) {
  return fetchLatestPrices(symbols);
}

async function loadMarketStrip() {
  const etfSyms = ['SPY','QQQ','DIA'];
  const [etfPrices, cryptoData] = await Promise.all([
    fetchLatestPrices(etfSyms),
    fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true',
      {signal: AbortSignal.timeout(8000)}).then(r=>r.json()).catch(()=>({})),
  ]);

  const strip = [
    {sym:'SPY', name:'S&P 500 ETF'},
    {sym:'QQQ', name:'Nasdaq ETF'},
    {sym:'DIA', name:'Dow Jones ETF'},
  ].map(({sym, name}) => {
    const q = etfPrices[sym];
    if (!q) return {ticker:sym, name, price:'—', pct:null};
    return {ticker:sym, name, price:'$'+q.price.toFixed(2), pct:q.pct!=null?+q.pct.toFixed(2):null};
  });

  const btc = cryptoData?.bitcoin;
  const eth = cryptoData?.ethereum;
  strip.push({ticker:'BTC', name:'Bitcoin',  price: btc?'$'+btc.usd.toLocaleString('en-US',{maximumFractionDigits:0}):'—', pct: btc?+btc.usd_24h_change.toFixed(2):0});
  strip.push({ticker:'ETH', name:'Ethereum', price: eth?'$'+eth.usd.toLocaleString('en-US',{maximumFractionDigits:0}):'—', pct: eth?+eth.usd_24h_change.toFixed(2):0});

  return strip;
}

async function loadAll() {
  // 1. Account + Positions in parallel
  const [acct, positions] = await Promise.all([alpGet("/account"), alpGet("/positions")]);

  const totalValue   = +acct.portfolio_value;
  const cash         = +acct.cash;
  const equity       = +acct.equity;
  const lastEquity   = +acct.last_equity;
  const dayChange    = equity - lastEquity;
  const dayChangePct = lastEquity ? (dayChange/lastEquity)*100 : 0;

  const portfolio = {
    totalValue, dayChange, dayChangePct,
    totalReturn:    totalValue - CFG.startCapital,
    totalReturnPct: ((totalValue-CFG.startCapital)/CFG.startCapital)*100,
    cash,
    buyingPower: +acct.buying_power,
    asOf: new Date().toLocaleString('en-US',{month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',timeZoneName:'short'}),
    accountNo: acct.account_number,
  };

  // Enrich position prices with Yahoo Finance live quotes
  const heldTickers = positions.map(p => p.symbol);
  const liveQuotes = heldTickers.length ? await fetchYahooQuotes(heldTickers) : {};

  const holdings = positions.map(p=>{
    const live = liveQuotes[p.symbol];
    const price  = live ? live.price  : +(p.current_price||0);
    // live.pct is null when day% looked like bad data (>30% move)
    const pct    = live ? (live.pct !== null ? live.pct : null) : +(p.change_today||0)*100;
    const shares = +p.qty;
    const costBasis = +p.avg_entry_price;
    const value  = price * shares;
    const unrealizedPl    = value - costBasis * shares;
    const unrealizedPlPct = costBasis ? (unrealizedPl / (costBasis * shares)) * 100 : 0;
    return {
      ticker: p.symbol,
      name:   NAMES[p.symbol]||p.symbol,
      shares,
      price,
      dayPct: pct,
      value,
      costBasis,
      unrealizedPl,
      unrealizedPlPct,
    };
  });

  // 2. Synthetic equity curve (90 days, starting capital → current)
  const rng=(()=>{let x=7;return()=>(x=(x*9301+49297)%233280)/233280;})();
  const equity_curve = Array.from({length:90},(_,i)=>{
    const frac=i/89;
    const base=CFG.startCapital+(totalValue-CFG.startCapital)*Math.pow(frac,0.9);
    const noise=(rng()-0.45)*totalValue*0.025*(1-frac*0.5);
    const d=new Date(); d.setDate(d.getDate()-(89-i));
    return {date:d, value:Math.max(CFG.startCapital*0.75,base+noise)};
  });
  equity_curve[89].value=totalValue;

  const heldSymbols = holdings.map(h=>h.ticker);

  // 3. News + Capitol Trades + Signals + Market Strip — all parallel
  const [newsItems, capitolData, signalData, marketStrip] = await Promise.all([
    loadNews([...heldSymbols,"SPY"]),
    loadCapitol(),
    loadSignals(heldSymbols, holdings),
    loadMarketStrip(),
  ]);

  // 4. Daily summary text
  const summary = buildSummary(portfolio, holdings, newsItems, signalData);

  return {portfolio, holdings, equity_curve, news:newsItems, capitol:capitolData, signals:signalData, summary, marketStrip};
}

let _newsCache = null;
let _newsCacheTs = 0;
function bustNewsCache(){ _newsCacheTs = 0; }

// Domain → display name + colour
const SRC_MAP = {
  'marketwatch.com': {name:'MarketWatch', color:'#059669'},
  'cnbc.com':        {name:'CNBC',        color:'#dc2626'},
  'reuters.com':     {name:'Reuters',     color:'#ff8000'},
  'bloomberg.com':   {name:'Bloomberg',   color:'#f59e0b'},
  'wsj.com':         {name:'WSJ',         color:'#1d4ed8'},
  'ft.com':          {name:'FT',          color:'#f97316'},
  'yahoo.com':       {name:'Yahoo Fin',   color:'#7c3aed'},
  'apnews.com':      {name:'AP News',     color:'#cc0000'},
  'barrons.com':     {name:"Barron's",    color:'#1d4ed8'},
  'benzinga.com':    {name:'Benzinga',    color:'#6b7280'},
};
function srcFromUrl(url){
  try{
    const host=new URL(url).hostname.replace(/^www\./,'');
    for(const [k,v] of Object.entries(SRC_MAP)) if(host.endsWith(k)) return v;
  }catch{}
  return {name:'News',color:'#6b7280'};
}

// 1. Alpaca News API — stock-specific, always works, shows real source domain
async function fetchAlpacaNews(tickers){
  try{
    const syms=tickers.filter(t=>!t.startsWith('^')).join(',');
    const r=await fetch(`https://data.alpaca.markets/v1beta1/news?symbols=${syms}&limit=10&sort=desc`,
      {headers:AH,signal:AbortSignal.timeout(10000)});
    if(!r.ok) return [];
    const d=await r.json();
    return (d?.news||[]).map(n=>{
      const {name:src,color:srcColor}=srcFromUrl(n.url||'');
      const title=n.headline||''; const blurb=(n.summary||'').slice(0,240);
      const date=n.created_at?new Date(n.created_at):new Date();
      return{src,srcColor,time:timeAgo(date.toISOString()),date,
        tickers:(n.symbols||[]).slice(0,3),title,blurb,
        sentiment:sentimentOf(title+' '+blurb),
        image:n.images?.find(i=>i.size==='thumb')?.url||null,url:n.url||null};
    }).filter(n=>n.title);
  }catch{return[];}
}

// Source name → colour
const PUB_COLORS={
  'Reuters':'#ff8000','Bloomberg':'#f59e0b','CNBC':'#dc2626',
  'MarketWatch':'#059669','Dow Jones':'#1d4ed8','WSJ':'#1d4ed8',
  'The Wall Street Journal':'#1d4ed8','Financial Times':'#f97316',
  'Yahoo Finance':'#7c3aed',"Barron's":'#1d4ed8','Forbes':'#e11d48',
  'Fortune':'#d97706','Business Insider':'#6366f1','AP':'#cc0000',
  'Associated Press':'#cc0000','Seeking Alpha':'#0ea5e9',
  'Investopedia':'#22d3ee','The Motley Fool':'#a855f7',
};
function pubColor(name=''){
  for(const[k,v] of Object.entries(PUB_COLORS)) if(name.includes(k)) return v;
  return '#8b8b8b';
}

// Finnhub market news — proper financial news API, CORS enabled
async function fetchFinnhubNews(){
  try{
    const r=await fetch(
      `https://finnhub.io/api/v1/news?category=general&token=${CFG.finnhub}`,
      {signal:AbortSignal.timeout(10000)}
    );
    if(!r.ok) return [];
    const items=await r.json();
    const seen=new Set();
    return items.slice(0,30).map(n=>{
      const title=(n.headline||'').trim();
      if(!title||seen.has(title.slice(0,60))) return null;
      seen.add(title.slice(0,60));
      const src=n.source||'News';
      const srcColor=pubColor(src)||srcFromUrl(n.url||'').color;
      const date=new Date((n.datetime||0)*1000);
      return{
        src,srcColor,
        time:timeAgo(date.toISOString()),
        date,tickers:[],
        title,blurb:(n.summary||'').slice(0,240),
        sentiment:sentimentOf(title+' '+(n.summary||'')),
        image:n.image||null,
        url:n.url||null,
      };
    }).filter(Boolean);
  }catch(e){console.warn('Finnhub news failed:',e.message);return[];}
}

async function loadNews(tickers){
  if(_newsCache&&(Date.now()-_newsCacheTs)<15*60*1000) return _newsCache;
  const[finnRes,alpacaRes]=await Promise.allSettled([
    fetchFinnhubNews(),
    fetchAlpacaNews(tickers),
  ]);
  const finnhub =finnRes.status==='fulfilled'?finnRes.value:[];
  const alpaca  =alpacaRes.status==='fulfilled'?alpacaRes.value:[];
  // Merge: finnhub first (diverse sources), alpaca for stock-specific items not already in finnhub
  const titles=new Set(finnhub.map(n=>n.title.slice(0,60)));
  const extra=alpaca.filter(n=>!titles.has(n.title.slice(0,60)));
  const all=[...finnhub,...extra];
  all.sort((a,b)=>b.date-a.date);
  const news=all.slice(0,24);
  _newsCache=news; _newsCacheTs=Date.now();
  return news;
}

async function loadCapitol() {
  try {
    const url=`https://bff.capitoltrades.com/trades?pageSize=8&page=0`;
    const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(10000)});
    const j=await r.json();
    const rows=j?.data||[];
    if(!rows.length) return null;
    return rows.slice(0,7).map(t=>({
      politician: t.politician?.fullName||"Unknown",
      party:      (t.politician?.party||"?")[0],
      chamber:    t.politician?.chamber||"?",
      ticker:     t._issuer?.ticker||"?",
      company:    t._issuer?.name||"?",
      action:     t.type==="purchase"?"Buy":"Sell",
      size:       t.size||"?",
      filed:      t.filingDate?new Date(t.filingDate).toLocaleDateString('en-US',{month:'short',day:'numeric'}):"?",
      traded:     t.transactionDate?new Date(t.transactionDate).toLocaleDateString('en-US',{month:'short',day:'numeric'}):"?",
    }));
  } catch { return null; }
}

async function loadSignals(heldSymbols, holdings) {
  const all=[...new Set([...heldSymbols,...WATCHLIST_SYMS])].slice(0,20);

  // Fetch bars (momentum) and live prices (display) in parallel
  const [barsArr, livePrices] = await Promise.all([
    Promise.allSettled(all.map(getBars)),
    fetchLatestPrices(all),
  ]);

  return all.map((sym,i)=>{
    const bars  = barsArr[i].status==='fulfilled' ? barsArr[i].value : [];
    const score = calcMomentum(bars);
    const pos   = holdings.find(h=>h.ticker===sym);
    const plPct = pos ? pos.unrealizedPlPct : null;

    // Use real-time trade price, fall back to position price, then bar close
    const live  = livePrices[sym];
    const price = live?.price || pos?.price || (bars.length ? bars[bars.length-1].c : 0);
    const dayPct = live?.pct ?? null;

    let signal="WATCH", signalColor="var(--text-2)";
    if(pos){
      if(plPct!=null&&plPct<=-7)  {signal="STOP LOSS";  signalColor="var(--down)";}
      else if(plPct!=null&&plPct>=15){signal="TAKE PROFIT";signalColor="var(--amber)";}
      else if(score!==null&&score>0.05){signal="HOLD ▲"; signalColor="var(--up)";}
      else{signal="HOLD"; signalColor="var(--text-1)";}
    } else {
      if(score===null)       {signal="NO DATA";   signalColor="var(--text-3)";}
      else if(score>0.07)    {signal="STRONG BUY";signalColor="var(--up)";}
      else if(score>0.02)    {signal="BUY";        signalColor="oklch(0.75 0.14 165)";}
      else if(score>-0.02)   {signal="NEUTRAL";   signalColor="var(--text-2)";}
      else                   {signal="AVOID";      signalColor="var(--down)";}
    }
    return {symbol:sym, score, signal, signalColor, inPortfolio:!!pos, plPct, price, dayPct, name:NAMES[sym]||sym};
  }).sort((a,b)=>(b.score||0)-(a.score||0));
}

function buildSummary(portfolio, holdings, news, signals) {
  const gainers=holdings.filter(h=>h.unrealizedPlPct>0).sort((a,b)=>b.unrealizedPlPct-a.unrealizedPlPct);
  const losers =holdings.filter(h=>h.unrealizedPlPct<0).sort((a,b)=>a.unrealizedPlPct-b.unrealizedPlPct);
  const topBuys=signals.filter(s=>!s.inPortfolio&&s.score&&s.score>0.02).slice(0,3);
  const stopRisk=signals.filter(s=>s.inPortfolio&&s.plPct!=null&&s.plPct<=-4);
  const bullNews=news.filter(n=>n.sentiment>0).length;
  const bearNews=news.filter(n=>n.sentiment<0).length;
  return {gainers,losers,topBuys,stopRisk,bullNews,bearNews};
}

function PortfolioChart({portfolio,equity_curve}){
  const [range,setRange]=useState('ALL');
  const [hover,setHover]=useState(null);
  const wrapRef=useRef(null);
  const [w,setW]=useState(800);
  const h=240,pad={l:8,r:8,t:12,b:28};

  useEffect(()=>{
    const ro=new ResizeObserver(entries=>{for(const e of entries)setW(Math.floor(e.contentRect.width));});
    if(wrapRef.current)ro.observe(wrapRef.current);
    return()=>ro.disconnect();
  },[]);

  const data=useMemo(()=>{
    const cuts={'1D':1,'1W':7,'1M':30,'3M':90,'ALL':90};
    return (equity_curve||[]).slice(-(cuts[range]||90));
  },[range,equity_curve]);

  if(!data||!data.length) return <div style={{background:'var(--bg-1)',border:'1px solid var(--border)',borderRadius:14,padding:40,textAlign:'center',color:'var(--text-3)'}}>Loading chart…</div>;

  const minV=Math.min(...data.map(d=>d.value))*0.985;
  const maxV=Math.max(...data.map(d=>d.value))*1.005;
  const x=i=>pad.l+(i/(data.length-1))*(w-pad.l-pad.r);
  const y=v=>pad.t+(1-(v-minV)/(maxV-minV))*(h-pad.t-pad.b);
  const pathD=data.map((d,i)=>(i?'L':'M')+x(i).toFixed(2)+' '+y(d.value).toFixed(2)).join(' ');
  const areaD=pathD+` L ${x(data.length-1).toFixed(2)} ${h-pad.b} L ${x(0).toFixed(2)} ${h-pad.b} Z`;
  const positive=(portfolio?.dayChange||0)>=0;
  const lineColor=positive?'var(--up)':'var(--down)';
  const ticks=4;
  const tickVals=Array.from({length:ticks+1},(_,i)=>minV+(maxV-minV)*(i/ticks));

  return (
    <div style={{background:'var(--bg-1)',border:'1px solid var(--border)',borderRadius:14,padding:'20px 22px 16px',display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:16}}>
        <div>
          <div style={{fontSize:11.5,color:'var(--text-2)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8,fontWeight:500}}>Portfolio value</div>
          <div style={{display:'flex',alignItems:'baseline',gap:14,flexWrap:'wrap'}}>
            <div className="num" style={{fontSize:36,fontWeight:600,letterSpacing:'-0.02em',lineHeight:1}}>
              {fmtMoney(hover?hover.d.value:portfolio?.totalValue||0)}
            </div>
            <div className="num" style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:13,padding:'4px 9px',borderRadius:6,fontWeight:500,color:positive?'var(--up)':'var(--down)',background:positive?'var(--up-soft)':'var(--down-soft)'}}>
              {positive?'▲':'▼'} {fmtMoney(Math.abs(portfolio?.dayChange||0))} ({Math.abs(portfolio?.dayChangePct||0).toFixed(2)}%) today
            </div>
          </div>
          <div style={{fontSize:11.5,color:'var(--text-3)',display:'flex',alignItems:'center',gap:6,marginTop:8}}>
            <I.Dot size={8} stroke="var(--up)"/> Live · {portfolio?.asOf}
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:10}}>
          <div style={{display:'flex',gap:2,background:'var(--bg-2)',padding:3,borderRadius:8,border:'1px solid var(--border)'}}>
            {['1D','1W','1M','3M','ALL'].map(r=>(
              <button key={r} style={{fontSize:11.5,padding:'5px 11px',borderRadius:6,cursor:'pointer',background:r===range?'var(--bg-4)':'transparent',color:r===range?'var(--text-0)':'var(--text-2)',border:'none',fontWeight:r===range?500:400}} onClick={()=>setRange(r)}>{r}</button>
            ))}
          </div>
        </div>
      </div>

      <div ref={wrapRef} style={{position:'relative',width:'100%'}}>
        <svg width={w} height={h}
          onMouseMove={e=>{const rect=e.currentTarget.getBoundingClientRect();const px=e.clientX-rect.left;const idx=Math.max(0,Math.min(data.length-1,Math.round((px-pad.l)/(w-pad.l-pad.r)*(data.length-1))));setHover({idx,x:x(idx),y:y(data[idx].value),d:data[idx]});}}
          onMouseLeave={()=>setHover(null)}
          style={{display:'block',cursor:'crosshair'}}>
          <defs>
            <linearGradient id="grad" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stopColor={positive?'oklch(0.78 0.18 145)':'oklch(0.68 0.22 25)'} stopOpacity="0.28"/>
              <stop offset="100%" stopColor={positive?'oklch(0.78 0.18 145)':'oklch(0.68 0.22 25)'} stopOpacity="0"/>
            </linearGradient>
          </defs>
          {tickVals.map((v,i)=>(
            <g key={i}>
              <line x1={pad.l} x2={w-pad.r} y1={y(v)} y2={y(v)} stroke="var(--border)" strokeDasharray="2 4"/>
              <text x={w-pad.r-2} y={y(v)-4} textAnchor="end" fontSize="10" fill="var(--text-3)" className="num">{fmtCompact(v)}</text>
            </g>
          ))}
          <path d={areaD} fill="url(#grad)"/>
          <path d={pathD} fill="none" stroke={lineColor} strokeWidth="1.75"/>
          {[0,Math.floor(data.length/4),Math.floor(data.length/2),Math.floor(data.length*3/4),data.length-1].map(i=>(
            <text key={i} x={x(i)} y={h-8} textAnchor="middle" fontSize="10.5" fill="var(--text-3)" className="num">{fmtDate(data[i].date)}</text>
          ))}
          {hover&&(
            <g>
              <line x1={hover.x} x2={hover.x} y1={pad.t} y2={h-pad.b} stroke="var(--text-3)" strokeDasharray="2 3" strokeWidth="1"/>
              <circle cx={hover.x} cy={hover.y} r="4" fill={lineColor} stroke="var(--bg-0)" strokeWidth="2"/>
            </g>
          )}
        </svg>
        {hover&&(
          <div style={{position:'absolute',left:Math.min(w-160,Math.max(8,hover.x+12)),top:Math.max(8,hover.y-50),background:'var(--bg-3)',border:'1px solid var(--border-strong)',borderRadius:8,padding:'8px 11px',fontSize:11.5,pointerEvents:'none',minWidth:140}}>
            <div style={{color:'var(--text-2)',fontSize:10.5,marginBottom:3}} className="num">{hover.d.date.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
            <div className="num" style={{fontWeight:600,fontSize:13}}>{fmtMoney(hover.d.value)}</div>
          </div>
        )}
      </div>

      <div style={{display:'flex',gap:32,paddingTop:14,borderTop:'1px solid var(--border)'}}>
        {[
          {label:'Total return',value:(portfolio?.totalReturn>=0?'+':'')+fmtMoney(portfolio?.totalReturn||0,0),color:'var(--up)',sub:`${portfolio?.totalReturnPct>=0?'+':''}${(portfolio?.totalReturnPct||0).toFixed(2)}% all-time`},
          {label:'Cash',value:fmtMoney(portfolio?.cash||0)},
          {label:'Buying power',value:fmtMoney(portfolio?.buyingPower||0)},
          {label:'Positions',value:String(portfolio?.positions||'—')},
        ].map(s=>(
          <div key={s.label} style={{display:'flex',flexDirection:'column',gap:3}}>
            <span style={{fontSize:11,color:'var(--text-2)',fontWeight:450}}>{s.label}</span>
            <span className="num" style={{fontSize:14,fontWeight:500,color:s.color||'var(--text-0)'}}>{s.value}</span>
            {s.sub&&<span style={{fontSize:11,color:'var(--text-2)'}}>{s.sub}</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

function Sparkline({up}){
  const pts=useMemo(()=>{const arr=[];let v=50;for(let i=0;i<12;i++){v+=(Math.sin(i*1.3+(up?1:2))+(Math.random()*0.5-0.25))*(up?3:-3)+(up?1.2:-1.2);arr.push(v);}return arr;},[up]);
  const ww=70,hh=22,min=Math.min(...pts),max=Math.max(...pts);
  const x=i=>(i/(pts.length-1))*ww;
  const y=v=>hh-((v-min)/(max-min||1))*hh;
  const d=pts.map((v,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' ');
  return <svg width={ww} height={hh} style={{display:'block'}}><path d={d} fill="none" stroke={up?'var(--up)':'var(--down)'} strokeWidth="1.4" strokeLinecap="round"/></svg>;
}

// ═══════════════════════════════════════════════════════
// ALLOCATION DONUT
// ═══════════════════════════════════════════════════════
function AllocationCard({holdings}){
  if(!holdings||!holdings.length) return null;
  const total=holdings.reduce((a,h)=>a+h.value,0);
  const ranked=[...holdings].sort((a,b)=>b.value-a.value);
  const size=140,stroke=22,r=(size-stroke)/2,circ=2*Math.PI*r;
  let offset=0;
  return (
    <div style={{background:'var(--bg-1)',border:'1px solid var(--border)',borderRadius:14,padding:'18px 20px',display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:14,fontWeight:600}}>Allocation</div>
          <div style={{fontSize:11.5,color:'var(--text-2)',marginTop:2}}>By position weight</div>
        </div>
      </div>
      <div style={{display:'flex',gap:18,alignItems:'center'}}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <g transform={`rotate(-90 ${size/2} ${size/2})`}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bg-3)" strokeWidth={stroke}/>
            {ranked.map((it,i)=>{
              const len=(it.value/total)*circ;
              const dash=`${len} ${circ-len}`;
              const seg=<circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={tickerColor(it.ticker)} strokeWidth={stroke} strokeDasharray={dash} strokeDashoffset={-offset}/>;
              offset+=len;
              return seg;
            })}
          </g>
          <text x={size/2} y={size/2-2} textAnchor="middle" fontSize="10" fill="var(--text-2)" letterSpacing="1.2">ALLOC</text>
          <text x={size/2} y={size/2+16} textAnchor="middle" fontSize="14" fontWeight="600" fill="var(--text-0)" className="num">{holdings.length} pos.</text>
        </svg>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:8}}>
          {ranked.map(it=>(
            <div key={it.ticker} style={{display:'flex',alignItems:'center',gap:10,fontSize:12.5}}>
              <span style={{width:8,height:8,borderRadius:2,background:tickerColor(it.ticker),flexShrink:0}}/>
              <span style={{fontFamily:'Geist Mono,monospace',fontWeight:500,width:46}}>{it.ticker}</span>
              <span style={{color:'var(--text-2)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{it.name}</span>
              <span className="num" style={{color:'var(--text-1)'}}>{((it.value/total)*100).toFixed(1)}%</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// NEWS FEED
// ═══════════════════════════════════════════════════════
function NewsFeed({news}){
  const all = news && news.length ? news : [];
  const [activeSrc, setActiveSrc] = useState(null);

  // Build unique source list from actual loaded news
  const sources = useMemo(()=>{
    const map={};
    all.forEach(n=>{
      if(n.src&&!map[n.src]) map[n.src]={name:n.src,color:n.srcColor||'#6b7280',count:0};
      if(n.src) map[n.src].count++;
    });
    return Object.values(map).sort((a,b)=>b.count-a.count);
  },[all]);

  const items = activeSrc ? all.filter(n=>n.src===activeSrc) : all;
  const isEmpty = !all.length;

  return (
    <div style={{background:'var(--bg-1)',border:'1px solid var(--border)',borderRadius:14,display:'flex',flexDirection:'column'}}>
      {/* Header */}
      <div style={{padding:'16px 20px 0',borderBottom:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
          <span style={{fontSize:14,fontWeight:600}}>Market News</span>
          <span style={{fontSize:10,color:'var(--up)',background:'var(--up-soft)',padding:'2px 7px',borderRadius:999,fontWeight:500,textTransform:'uppercase',letterSpacing:'0.04em'}}>Multi-Source · Live</span>
          {activeSrc&&<span onClick={()=>setActiveSrc(null)} style={{marginLeft:'auto',fontSize:10,color:'var(--text-2)',cursor:'pointer',padding:'2px 8px',borderRadius:6,border:'1px solid var(--border)',userSelect:'none'}} onMouseEnter={e=>e.target.style.color='var(--text-0)'} onMouseLeave={e=>e.target.style.color='var(--text-2)'}>✕ Clear filter</span>}
        </div>
        {/* Clickable source filter chips */}
        <div style={{display:'flex',gap:6,flexWrap:'wrap',paddingBottom:12}}>
          {sources.map(s=>{
            const active=activeSrc===s.name;
            return(
              <button key={s.name} onClick={()=>setActiveSrc(active?null:s.name)}
                style={{
                  fontSize:10,fontWeight:600,padding:'3px 10px',borderRadius:999,cursor:'pointer',
                  border:`1px solid ${active?s.color:'var(--border)'}`,

// STOCK DETAIL MODAL
// ═══════════════════════════════════════════════════════
function StockModal({symbol, holdings, onClose}){
  const RANGES=['1D','5D','10D','1M','3M','6M','1Y'];
  const [range,setRange]=useState('3M');
  const [bars,setBars]=useState([]);
  const [chartLoading,setChartLoading]=useState(true);
  const wrapRef=useRef(null);
  const [w,setW]=useState(600);
  const [hover,setHover]=useState(null);
  const isMobile=useIsMobile();

  const pos=holdings?.find(h=>h.ticker===symbol);

  useEffect(()=>{
    setChartLoading(true); setBars([]); setHover(null);
    getDetailBars(symbol,range).then(b=>{setBars(b);setChartLoading(false);});
  },[symbol,range]);

  useEffect(()=>{
    const ro=new ResizeObserver(entries=>{for(const e of entries)setW(Math.floor(e.contentRect.width));});
    if(wrapRef.current)ro.observe(wrapRef.current);
    return()=>ro.disconnect();
  },[]);

  useEffect(()=>{
    const onKey=e=>{if(e.key==='Escape')onClose();};
    document.addEventListener('keydown',onKey);
    return()=>document.removeEventListener('keydown',onKey);
  },[onClose]);

  const rangeChange=bars.length>=2?((bars[bars.length-1].c-bars[0].o)/bars[0].o)*100:null;
  const displayPrice=hover?hover.d.c:(bars.length?bars[bars.length-1].c:null);
  const displayPct=hover
    ?(bars.length?((hover.d.c-bars[0].o)/bars[0].o)*100:null)
    :rangeChange;
  const positive=(displayPct||0)>=0;

  // Chart
  const chartH=isMobile?180:240, pad={l:6,r:6,t:8,b:24};
  const vals=bars.map(b=>b.c);
  const minV=vals.length?Math.min(...vals)*0.993:0;
  const maxV=vals.length?Math.max(...vals)*1.007:1;
  const cx=i=>pad.l+(i/(Math.max(vals.length-1,1)))*(w-pad.l-pad.r);
  const cy=v=>pad.t+(1-(v-minV)/(maxV-minV||1))*(chartH-pad.t-pad.b);
  const pathD=vals.map((v,i)=>(i?'L':'M')+cx(i).toFixed(2)+' '+cy(v).toFixed(2)).join(' ');
  const areaD=vals.length?pathD+` L ${cx(vals.length-1).toFixed(2)} ${chartH-pad.b} L ${cx(0).toFixed(2)} ${chartH-pad.b} Z`:'';
  const lineClr=positive?'var(--up)':'var(--down)';

  // Date label helper
  const fmtBarDate=b=>{
    if(!b)return'';
    const d=new Date(b.t);
    if(range==='1D')return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:range==='1Y'?'numeric':undefined});
  };

  return (
    <div style={{position:'fixed',inset:0,zIndex:300,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'center',justifyContent:'center',padding:isMobile?'0':'20px',backdropFilter:'blur(4px)'}}
      onClick={onClose}>
      <div style={{background:'var(--bg-1)',border:'1px solid var(--border-strong)',borderRadius:isMobile?'16px 16px 0 0':16,width:isMobile?'100%':'min(780px,96vw)',maxHeight:isMobile?'92vh':'90vh',overflow:'auto',padding:isMobile?'20px 18px 32px':'28px',position:isMobile?'fixed':'relative',bottom:isMobile?0:'auto',boxShadow:'0 24px 80px rgba(0,0,0,0.6)'}}
        onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18}}>
          <div style={{width:40,height:40,borderRadius:10,display:'grid',placeItems:'center',fontSize:12,fontWeight:600,fontFamily:'Geist Mono,monospace',background:`color-mix(in oklab, ${tickerColor(symbol)} 18%, var(--bg-2))`,color:tickerColor(symbol),flexShrink:0}}>
            {symbol.slice(0,2)}
          </div>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:17,fontWeight:700,fontFamily:'Geist Mono,monospace'}}>{symbol}</span>
              {pos&&<span style={{fontSize:10,color:'var(--accent)',background:'var(--accent-soft)',padding:'2px 8px',borderRadius:4,fontWeight:600,textTransform:'uppercase'}}>HELD</span>}
            </div>
            <div style={{fontSize:12,color:'var(--text-2)',marginTop:1}}>{NAMES[symbol]||symbol}</div>
          </div>
          <button onClick={onClose} style={{background:'transparent',border:'1px solid var(--border)',color:'var(--text-2)',width:32,height:32,borderRadius:8,cursor:'pointer',fontSize:16,display:'grid',placeItems:'center',flexShrink:0}}>✕</button>
        </div>

        {/* Price + range change */}
        <div style={{marginBottom:16}}>
          <div style={{display:'flex',alignItems:'baseline',gap:12,flexWrap:'wrap'}}>
            <div className="num" style={{fontSize:isMobile?28:34,fontWeight:600,letterSpacing:'-0.02em',lineHeight:1}}>
              {displayPrice?`$${displayPrice.toFixed(2)}`:'—'}
            </div>
            {displayPct!==null&&(
              <div className="num" style={{fontSize:14,fontWeight:500,padding:'4px 10px',borderRadius:6,color:positive?'var(--up)':'var(--down)',background:positive?'var(--up-soft)':'var(--down-soft)'}}>
                {positive?'▲':'▼'} {Math.abs(displayPct).toFixed(2)}%
                <span style={{opacity:0.7,marginLeft:6,fontSize:12}}>{hover?fmtBarDate(bars[hover.idx]):range}</span>
              </div>
            )}
          </div>
          {hover&&<div style={{fontSize:11,color:'var(--text-3)',marginTop:5}}>{fmtBarDate(bars[hover.idx])}</div>}
        </div>

        {/* Range selector */}
        <div style={{display:'flex',gap:2,background:'var(--bg-2)',padding:3,borderRadius:8,border:'1px solid var(--border)',marginBottom:14,width:'fit-content'}}>
          {RANGES.map(r=>(
            <button key={r} onClick={()=>{setRange(r);setHover(null);}}
              style={{fontSize:11.5,padding:'5px 10px',borderRadius:6,cursor:'pointer',background:r===range?'var(--bg-4)':'transparent',color:r===range?'var(--text-0)':'var(--text-2)',border:'none',fontWeight:r===range?600:400,fontFamily:'inherit',transition:'all .1s'}}>
              {r}
            </button>
          ))}
        </div>

        {/* Chart */}
        <div ref={wrapRef} style={{width:'100%',position:'relative'}}>
          {chartLoading?(
            <div style={{height:chartH,display:'grid',placeItems:'center',color:'var(--text-3)'}}>
              <I.Refresh size={22} className="spin" stroke="var(--accent)"/>
            </div>
          ):bars.length<2?(
            <div style={{height:chartH,display:'grid',placeItems:'center',color:'var(--text-3)',fontSize:13}}>No data available</div>
          ):(
            <svg width={w} height={chartH} style={{display:'block',cursor:'crosshair'}}
              onMouseMove={e=>{
                const rect=e.currentTarget.getBoundingClientRect();
                const px=e.clientX-rect.left;
                const idx=Math.max(0,Math.min(bars.length-1,Math.round((px-pad.l)/(w-pad.l-pad.r)*(bars.length-1))));
                setHover({idx,x:cx(idx),y:cy(bars[idx].c),d:bars[idx]});
              }}
              onMouseLeave={()=>setHover(null)}>
              <defs>
                <linearGradient id="sgrd" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stopColor={positive?'oklch(0.78 0.18 145)':'oklch(0.68 0.22 25)'} stopOpacity="0.22"/>
                  <stop offset="100%" stopColor={positive?'oklch(0.78 0.18 145)':'oklch(0.68 0.22 25)'} stopOpacity="0"/>
                </linearGradient>
              </defs>
              {[0,1,2,3].map(i=>{
                const v=minV+(maxV-minV)*(i/3);
                return <g key={i}>
                  <line x1={pad.l} x2={w-pad.r} y1={cy(v)} y2={cy(v)} stroke="var(--border)" strokeDasharray="2 4"/>
                  <text x={w-pad.r-2} y={cy(v)-4} textAnchor="end" fontSize="10" fill="var(--text-3)" className="num">{fmtCompact(v)}</text>
                </g>;
              })}
              {/* Date ticks at bottom */}
              {[0,Math.floor(bars.length/4),Math.floor(bars.length/2),Math.floor(bars.length*3/4),bars.length-1].filter((v,i,a)=>a.indexOf(v)===i).map(i=>(
                <text key={i} x={cx(i)} y={chartH-6} textAnchor="middle" fontSize="10" fill="var(--text-3)" className="num">{fmtBarDate(bars[i])}</text>
              ))}
              <path d={areaD} fill="url(#sgrd)"/>
              <path d={pathD} fill="none" stroke={lineClr} strokeWidth="1.8"/>
              {hover&&<>
                <line x1={hover.x} x2={hover.x} y1={pad.t} y2={chartH-pad.b} stroke="var(--border-strong)" strokeWidth="1" strokeDasharray="3 3"/>
                <circle cx={hover.x} cy={hover.y} r={4} fill={lineClr} stroke="var(--bg-1)" strokeWidth="2"/>
                <rect x={Math.min(hover.x+8,w-90)} y={hover.y-22} width={82} height={20} rx={5} fill="var(--bg-3)" stroke="var(--border)"/>
                <text x={Math.min(hover.x+12,w-86)} y={hover.y-8} fontSize="11" fill="var(--text-0)" className="num">${hover.d.c.toFixed(2)}</text>
              </>}
            </svg>
          )}
        </div>

        {/* OHLV row on hover */}
        {hover&&(
          <div style={{display:'flex',gap:16,fontSize:11,color:'var(--text-2)',marginTop:8,fontFamily:'Geist Mono,monospace'}}>
            {[['O',hover.d.o],['H',hover.d.h],['L',hover.d.l],['C',hover.d.c]].map(([k,v])=>(
              <span key={k}><span style={{color:'var(--text-3)'}}>{k} </span>${v.toFixed(2)}</span>
            ))}
          </div>
        )}

        {/* Position details if held */}
        {pos&&(
          <div style={{marginTop:18,display:'grid',gridTemplateColumns:isMobile?'1fr 1fr':'repeat(4,1fr)',gap:12,borderTop:'1px solid var(--border)',paddingTop:16}}>
            {[
              {label:'Bought At',value:`$${pos.costBasis.toFixed(2)}`},
              {label:'Current',value:`$${pos.price.toFixed(2)}`},
              {label:'Shares',value:pos.shares.toFixed(4)},
              {label:'Total P&L',value:`${pos.unrealizedPl>=0?'+':''}${fmtMoney(pos.unrealizedPl)}`,sub:`${pos.unrealizedPl>=0?'+':''}${pos.unrealizedPlPct.toFixed(2)}%`,color:pos.unrealizedPl>=0?'var(--up)':'var(--down)'},
            ].map(k=>(
              <div key={k.label}>
                <div style={{fontSize:10,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>{k.label}</div>
                <div className="num" style={{fontSize:15,fontWeight:600,color:k.color||'var(--text-0)'}}>{k.value}</div>
                {k.sub&&<div className="num" style={{fontSize:11,color:k.color||'var(--text-2)',marginTop:1}}>{k.sub}</div>}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// MOBILE BOTTOM NAV
// ═══════════════════════════════════════════════════════
function BottomNav({active,setActive}){
  const items=[
    {key:'overview', label:'Home',      icon:'Grid'},
    {key:'portfolio',label:'Portfolio', icon:'Chart'},
    {key:'signals',  label:'Signals',   icon:'Bot'},
    {key:'news',     label:'News',      icon:'News'},
    {key:'orders',   label:'Orders',    icon:'Wallet'},
  ];
  return (
    <nav style={{position:'fixed',bottom:0,left:0,right:0,background:'rgba(10,10,10,0.96)',backdropFilter:'blur(20px)',borderTop:'1px solid var(--border)',display:'flex',zIndex:100,paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
      {items.map(item=>{
        const Ic=I[item.icon];
        const isA=active===item.key;
        return (
          <button key={item.key} onClick={()=>setActive(item.key)}
            style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'10px 4px 8px',background:'transparent',border:'none',cursor:'pointer',color:isA?'var(--accent)':'var(--text-3)',transition:'color .15s'}}>
            <Ic size={22} stroke={isA?'var(--accent)':'var(--text-3)'} strokeWidth={isA?2:1.6}/>
            <span style={{fontSize:10,fontWeight:isA?600:400}}>{item.label}</span>
          </button>
        );
      })}
    </nav>
  );
}

// ═══════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════
function App(){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [refreshing,setRefreshing]=useState(false);
  const [error,setError]=useState(null);
  const [lastRefresh,setLastRefresh]=useState(null);
  const [countdown,setCountdown]=useState(CFG.refreshMs/1000);
  const [active,setActive]=useState('overview');
  const [selectedStock,setSelectedStock]=useState(null);
  const isMobile=useIsMobile();

  const refresh=useCallback(async(manual=false)=>{
    if(manual) bustNewsCache();
    setRefreshing(true);
    setError(null);
    try {
      const d=await loadAll();
      d.portfolio.positions=d.holdings.length;
      setData(d);
      setLastRefresh(new Date());
    } catch(e) {
      setError('Failed to load data: '+e.message+'. Check your API keys and network connection.');
    } finally {
      setLoading(false);
      setRefreshing(false);
    }
  },[]);

  useEffect(()=>{
    refresh();
    const interval=setInterval(()=>{
      refresh();
      setCountdown(CFG.refreshMs/1000);
    },CFG.refreshMs);
    const tick=setInterval(()=>setCountdown(c=>c>0?c-1:0),1000);
    return()=>{clearInterval(interval);clearInterval(tick);};
  },[refresh]);

  if(loading) return <LoadingScreen/>;

  const {portfolio,holdings,equity_curve,news,capitol,signals,summary,marketStrip}=data||{};

  const col2=(a,b)=>({display:'grid',gridTemplateColumns:isMobile?'1fr':`${a} ${b}`,gap:isMobile?12:16});
  const col4=isMobile?'1fr 1fr':'repeat(4,minmax(0,1fr))';
  const pad=isMobile?'12px 14px 90px':'22px 28px 40px';

  return (
    <div style={{display:'flex',minHeight:'100vh',background:'var(--bg-0)'}}>

      {/* Desktop sidebar — hidden on mobile */}
      {!isMobile&&<Sidebar active={active} setActive={setActive}/>}

      <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column'}}>

        {/* Topbar */}
        <div style={{display:'flex',alignItems:'center',gap:isMobile?10:14,padding:isMobile?'12px 16px':'14px 28px',borderBottom:'1px solid var(--border)',position:'sticky',top:0,background:'rgba(10,10,10,0.95)',backdropFilter:'blur(12px)',zIndex:10}}>
          {isMobile?(
            <>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <I.Logo size={20} stroke="var(--text-0)" strokeWidth={2.2}/>
                <span style={{fontSize:15,fontWeight:600}}>Ticker</span>
              </div>
              <div style={{flex:1}}/>
              {lastRefresh&&(
                <span style={{fontSize:10,color:'var(--text-3)',fontFamily:'Geist Mono,monospace'}}>
                  ↻{countdown}s
                </span>
              )}
              <button onClick={()=>refresh(true)} disabled={refreshing} style={{background:'var(--bg-2)',border:'1px solid var(--border)',color:'var(--text-1)',width:34,height:34,borderRadius:8,cursor:refreshing?'default':'pointer',display:'grid',placeItems:'center',opacity:refreshing?0.6:1}}>
                <I.Refresh size={15} className={refreshing?'spin':''}/>
              </button>
            </>
          ):(
            <>
              <div style={{fontSize:13,color:'var(--text-2)'}}>Trading <span style={{margin:'0 8px',color:'var(--text-3)'}}>/</span><span style={{color:'var(--text-0)',fontWeight:500,textTransform:'capitalize'}}>{active}</span></div>
              <div style={{flex:1,maxWidth:360,marginLeft:18,display:'flex',alignItems:'center',gap:8,background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 12px',color:'var(--text-2)',fontSize:12.5}}>
                <I.Search size={14}/>
                <input style={{background:'transparent',border:'none',outline:'none',color:'var(--text-0)',fontFamily:'inherit',fontSize:13,flex:1}} placeholder="Search tickers, news…"/>
              </div>
              <div style={{flex:1}}/>
              {lastRefresh&&(
                <div style={{fontSize:11,color:'var(--text-3)',display:'flex',alignItems:'center',gap:8}}>
                  <I.Dot size={7} stroke="var(--up)"/>
                  <span>Updated {lastRefresh.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'})}</span>
                  <span style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:5,padding:'2px 7px',fontFamily:'Geist Mono,monospace',color:countdown<10?'var(--amber)':'var(--text-3)'}}>↻ {countdown}s</span>
                </div>
              )}
              <button onClick={()=>refresh(true)} disabled={refreshing} style={{background:'transparent',border:'1px solid var(--border)',color:'var(--text-1)',height:32,padding:'0 12px',borderRadius:8,cursor:refreshing?'default':'pointer',fontSize:12.5,display:'inline-flex',alignItems:'center',gap:6,opacity:refreshing?0.6:1}}>
                <I.Refresh size={13} className={refreshing?'spin':''}/> {refreshing?'Refreshing…':'Refresh'}
              </button>
            </>
          )}
        </div>

        {/* Content */}
        <div style={{padding:pad,display:'flex',flexDirection:'column',gap:isMobile?12:16,maxWidth:1600,width:'100%',alignSelf:'center'}}>
          {error&&<ErrorBanner error={error} onRetry={refresh}/>}

          {/* OVERVIEW */}
          {active==='overview'&&<>
            <BotAnalysis/>
            <WatchStrip marketStrip={marketStrip}/>
            <div style={{display:'grid',gridTemplateColumns:col4,gap:isMobile?10:14}}>
              {[
                {label:'Portfolio',value:fmtMoney(portfolio?.totalValue||0),sub:'Paper · PA33F7JFO4BL',icon:'Wallet'},
                {label:"Today's P/L",value:((portfolio?.dayChange||0)>=0?'+':'')+fmtMoney(portfolio?.dayChange||0),sub:`${(portfolio?.dayChangePct||0)>=0?'+':''}${(portfolio?.dayChangePct||0).toFixed(2)}%`,icon:'Up',color:(portfolio?.dayChange||0)>=0?'var(--up)':'var(--down)'},
                {label:'Total Return',value:((portfolio?.totalReturn||0)>=0?'+':'')+fmtMoney(portfolio?.totalReturn||0,0),sub:`${(portfolio?.totalReturnPct||0)>=0?'+':''}${(portfolio?.totalReturnPct||0).toFixed(2)}% from $20k`,icon:'Chart',color:(portfolio?.totalReturn||0)>=0?'var(--up)':'var(--down)'},
                {label:'Cash',value:fmtMoney(portfolio?.cash||0),sub:`${holdings?.length||0}/${CFG.maxPos||8} slots used`,icon:'Plus'},
              ].map(k=>{const Ic=I[k.icon];return(
                <div key={k.label} style={{background:'var(--bg-1)',border:'1px solid var(--border)',borderRadius:12,padding:isMobile?'12px 14px':'16px 18px',display:'flex',flexDirection:'column',gap:6}}>
                  <div style={{fontSize:10,color:'var(--text-2)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:500,display:'flex',alignItems:'center',gap:5}}><Ic size={11}/>{k.label}</div>
                  <div className="num" style={{fontSize:isMobile?18:22,fontWeight:600,color:k.color||'var(--text-0)'}}>{k.value}</div>
                  <div style={{fontSize:11,color:'var(--text-2)'}}>{k.sub}</div>
                </div>
              );})}
            </div>
            {!isMobile&&<DailySummary portfolio={portfolio} summary={summary} signals={signals}/>}
            <div style={col2('1.55fr','1fr')}>
              <PortfolioChart portfolio={portfolio} equity_curve={equity_curve}/>
              <AllocationCard holdings={holdings}/>
            </div>
            <Holdings holdings={holdings} onSelect={setSelectedStock}/>
            <div style={col2('1fr','1fr')}>
              <NewsFeed news={news}/>
              <CapitolFeed capitol={capitol}/>
            </div>
            <SignalsPanel signals={signals} holdings={holdings} onSelect={setSelectedStock}/>
          </>}

          {/* PORTFOLIO */}
          {active==='portfolio'&&<>
            <div style={col2('1.55fr','1fr')}>
              <PortfolioChart portfolio={portfolio} equity_curve={equity_curve}/>
              <AllocationCard holdings={holdings}/>
            </div>
            <Holdings holdings={holdings} onSelect={setSelectedStock}/>
          </>}

          {/* WATCHLIST */}
          {active==='watchlist'&&<>
            <WatchStrip marketStrip={marketStrip}/>
            <SignalsPanel signals={signals} holdings={holdings} onSelect={setSelectedStock}/>
          </>}

          {/* ORDERS */}
          {active==='orders'&&<OrdersPanel/>}

          {/* NEWS */}
          {active==='news'&&<>
            <NewsFeed news={news}/>
            <CapitolFeed capitol={capitol}/>
          </>}

          {/* CAPITOL */}
          {active==='capitol'&&<CapitolFeed capitol={capitol}/>}

          {/* SIGNALS */}
          {active==='signals'&&<>
            <DailySummary portfolio={portfolio} summary={summary} signals={signals}/>
            <SignalsPanel signals={signals} holdings={holdings} onSelect={setSelectedStock}/>
          </>}
        </div>
      </div>

      {/* Mobile bottom nav — hidden on desktop */}
      {isMobile&&<BottomNav active={active} setActive={setActive}/>}
      {selectedStock&&<StockModal symbol={selectedStock} holdings={holdings} onClose={()=>setSelectedStock(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
